services:
  # ─── Laravel API Backend ────────────────────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carteira_api
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_DATABASE=carteira_financeira
      - DB_USERNAME=nathan_carteira
      - DB_PASSWORD=1234
      - REDIS_HOST=redis
      - FRONTEND_URL=http://localhost:5173
    volumes:
      - ./backend:/var/www/html
      - ./backend/docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    depends_on:
      - db
      - redis
    networks:
      - app-network

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carteira_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_DATABASE=carteira_financeira
      - DB_USERNAME=nathan_carteira
      - DB_PASSWORD=1234
      - REDIS_HOST=redis
      - FRONTEND_URL=http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - ./backend:/var/www/html
      - ./backend/docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    depends_on:
      - db
      - redis
    command: sh -c "while true; do php artisan schedule:run --no-interaction --verbose; sleep 60; done"
    networks:
      - app-network

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carteira_queue
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_DATABASE=carteira_financeira
      - DB_USERNAME=nathan_carteira
      - DB_PASSWORD=1234
      - REDIS_HOST=redis
      - FRONTEND_URL=http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - ./backend:/var/www/html
      - ./backend/docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    depends_on:
      - db
      - redis
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    networks:
      - app-network

  nginx:
    image: nginx:stable-alpine
    container_name: carteira_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

  # ─── Vue 3 Frontend ─────────────────────────────────────────────────────────
  frontend:
    image: node:22-alpine
    container_name: carteira_frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - app-network

  # ─── Infrastructure ──────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: carteira_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: carteira_financeira
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_USER: nathan_carteira
      MYSQL_PASSWORD: 1234
    volumes:
      - dbdata:/var/lib/mysql
      - ./backend/docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3306:3306"
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: carteira_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: carteira_phpmyadmin
    restart: unless-stopped
    links:
      - db
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: 1234
    networks:
      - app-network

volumes:
  dbdata:

networks:
  app-network:
    driver: bridge
